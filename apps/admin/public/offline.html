<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <title>بصيره | غير متصل</title>
    <style>
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        background: #f8fafc;
        color: #0f172a;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(92vw, 440px);
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 24px;
        padding: 28px;
        box-shadow: 0 20px 45px -35px rgba(15, 23, 42, 0.45);
      }
      .mark {
        width: 48px;
        height: 48px;
        border-radius: 16px;
        display: grid;
        place-items: center;
        background: #0ea5e9;
        color: #0f172a;
        font-weight: 900;
        margin-bottom: 18px;
      }
      h1 { margin: 0 0 10px; font-size: 22px; }
      p { margin: 0; color: #475569; line-height: 1.8; }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">ب</div>
      <h1>الاتصال غير متاح حالياً</h1>
      <p>يمكنك العودة للصفحات التي تم فتحها مسبقاً عند توفرها في الذاكرة المؤقتة. أعد المحاولة بعد استعادة الاتصال.</p>
    </main>
  </body>
</html>
