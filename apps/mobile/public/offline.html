<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#121212" />
    <title>بصيره | غير متصل</title>
    <style>
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        background: #121212;
        color: #ffffff;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(90vw, 420px);
        border: 1px solid #34495e;
        border-radius: 24px;
        background: #1e272c;
        padding: 28px;
      }
      .mark {
        width: 56px;
        height: 56px;
        border-radius: 18px;
        display: grid;
        place-items: center;
        background: #ffff00;
        color: #121212;
        font-weight: 900;
        margin-bottom: 18px;
      }
      h1 { margin: 0 0 10px; font-size: 24px; }
      p { margin: 0; color: #d1d5db; line-height: 1.8; }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">ب</div>
      <h1>الاتصال غير متاح حالياً</h1>
      <p>يمكنك استخدام الصفحات التي تم فتحها مسبقاً إذا كانت محفوظة. يحتاج البحث والمسارات والطوارئ إلى اتصال فعّال.</p>
    </main>
  </body>
</html>
